<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanderly</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 min-h-screen flex flex-col">
    <!-- navbar: login screen has no app nav yet, just the brand, centered -->
    <div
      class="navbar bg-base-100 shadow-sm sticky top-0 z-20 px-4 lg:px-8 justify-center"
      style="background-color: #534ab7; color: white"
    >
      <span class="text-xl font-semibold">Wanderly</span>
    </div>
    <!-- navbar end -->

    <section
      class="flex-1 flex items-center justify-center p-4"
      style="background: #eeedfe"
    >
      <div class="flex items-center justify-center gap-16 w-full max-w-5xl lg:max-w-6xl xl:max-w-7xl">
        <!-- image -->
        <img
          src="./images/login-cropped.png"
          alt=""
          class="hidden md:block w-full max-w-sm lg:max-w-md xl:max-w-lg h-auto object-contain"
        />
        <!-- forms -->
        <div
          class="card bg-base-100 shadow-sm border border-base-200 w-full max-w-sm lg:max-w-md xl:max-w-lg flex-shrink-0"
        >
          <div class="card-body gap-4">
          <div class="flex flex-col items-center gap-1 mb-2">
            <div
              class="w-10 h-10 rounded-full flex items-center justify-center"
              style="background: #534ab7"
            >
              <span class="text-white text-lg font-bold leading-none">W</span>
            </div>
            <h1 class="text-xl font-semibold" style="color: #3c3489">
              Wanderly
            </h1>
          </div>

          <!-- log in / sign up switch -->
          <div class="flex text-sm font-medium border-b border-base-200">
            <button
              id="authTabLogin"
              class="flex-1 pb-2 border-b-2"
              style="border-color: #534ab7; color: #534ab7"
            >
              Log in
            </button>
            <button
              id="authTabSignup"
              class="flex-1 pb-2 border-b-2 border-transparent text-base-content/50"
            >
              Sign up
            </button>
          </div>

          <!-- log in form -->
          <form id="loginForm" class="flex flex-col gap-3">
            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Email</label>
              <input
                type="email"
                placeholder="you@example.com"
                class="input w-full"
              />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Password</label>
              <input
                type="password"
                placeholder="••••••••"
                class="input w-full"
              />
            </div>
            <button
              type="button"
              class="btn mt-1"
              style="background-color: #534ab7; color: white"
            >
              Log in
            </button>
          </form>

          <!-- sign up form -->
          <form id="signupForm" class="flex flex-col gap-3" hidden>
            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Name</label>
              <input type="text" placeholder="Your name" class="input w-full" />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Email</label>
              <input
                type="email"
                placeholder="you@example.com"
                class="input w-full"
              />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Password</label>
              <input
                type="password"
                placeholder="••••••••"
                class="input w-full"
              />
            </div>
            <button
              type="button"
              class="btn mt-1"
              style="background-color: #534ab7; color: white"
            >
              Create account
            </button>
          </form>

          <p class="text-xs text-center text-base-content/40 mt-1">
            Opening an invite link drops you here first if you're not already
            logged in, then joins you to that trip automatically.
          </p>
          </div>
        </div>
      </div>
    </section>
    <script src="login.js"></script>
  </body>
</html>
