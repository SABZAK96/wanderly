<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanderly</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 min-h-screen items-center justify-center">
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm" style="background-color: #534ab7; color: white;">
      <div class="navbar-start">
        
        <a class="btn btn-ghost text-xl">Wanderly</a>
        <div class="hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a>Plan</a></li>
            <li><a>Calendar</a></li>
            <li><a>Expense</a></li>
            <li><a>Packing</a></li>
          </ul>
        </div>
      </div>

      <div class="navbar-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full">
            <img
              alt="Tailwind CSS Navbar component"
              src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- navbar end -->
    <div class="flex flex-row gap-2">
      <section class=" md:block md:w-[35%] md:py-8 hidden" style="background: #eeedfe"></section>
      <section
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mx-auto py-8 md:px-0 px-8"
      >
        <div class="card bg-base-100 shadow-sm border border-base-200">
          <figure class="relative">
            <img
              src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
              alt="Disneyland Resort"
              class="w-full h-44 object-cover"
            />
            <div class="absolute top-2 left-2">
              <span
                class="badge text-white text-xs font-medium px-2 py-1"
                style="background: #534ab7; border: none"
                >#1</span
              >
            </div>
            <div class="absolute top-2 right-2">
              <span
                class="badge text-xs font-medium px-2 py-1"
                style="background: #eeedfe; color: #534ab7; border: none"
                >ticket required</span
              >
            </div>
          </figure>
          <div class="card-body p-4 gap-2">
            <div class="flex items-start justify-between gap-2">
              <h2
                class="card-title text-sm font-medium leading-tight"
                style="color: #3c3489"
              >
                Disneyland Resort
              </h2>
              <div class="flex items-center gap-0.5 shrink-0">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="#854F0B"
                  class="size-3.5"
                >
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                  />
                </svg>
                <span class="text-xs" style="color: #854f0b">4.8</span>
              </div>
            </div>
            <p
              class="text-xs text-base-content/60 leading-relaxed line-clamp-2"
            >
              The original Disney park — classic rides, parades, and the iconic
              Sleeping Beauty Castle. Great for all ages.
            </p>
            <div class="flex flex-col gap-1.5 mt-1">
              <div class="flex items-center gap-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="#534AB7"
                  class="size-4 shrink-0"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z"
                  />
                </svg>
                <span class="text-xs text-base-content/70"
                  >$109-$189 / person</span
                >
              </div>
              <div class="flex items-center gap-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="#534AB7"
                  class="size-4 shrink-0"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                  />
                </svg>
                <span class="text-xs text-base-content/70"
                  >10-12 hrs · full day</span
                >
              </div>
              <div class="flex items-center gap-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="#534AB7"
                  class="size-4 shrink-0"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  />
                </svg>
                <span class="text-xs text-base-content/70"
                  >Anaheim · 30 min from LA</span
                >
              </div>
            </div>
            <div class="card-actions justify-end mt-1">
              <button
                class="btn btn-sm text-white text-xs font-medium gap-1.5"
                style="background: #534ab7; border: none"
                onmouseover="this.style.background = '#3C3489'"
                onmouseout="this.style.background = '#534AB7'"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-4"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z"
                  />
                </svg>
                Add to calendar
              </button>
            </div>
          </div>
        </div>

      </section>
    </div>
  </body>
</html>
