<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanderly</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* mobile nav dropdown items */
      .nav-dropdown li > a {
        border-radius: 0.75rem;
        font-weight: 500;
        /* daisyUI's default menu padding is too tight for a touch dropdown */
        padding: 0.6rem 0.75rem;
      }
      .nav-dropdown li > a:hover {
        background: #eeedfe;
        color: #534ab7;
      }
    </style>
  </head>
  <body class="bg-base-200 min-h-screen flex flex-col">
    <!-- navbar -->
    <div
      class="navbar bg-base-100 shadow-sm sticky top-0 z-20 px-4 lg:px-8"
      style="background-color: #534ab7; color: white"
    >
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content nav-dropdown bg-base-100 text-base-content rounded-2xl z-1 mt-3 w-52 p-2 gap-0.5 shadow-lg border border-base-200"
          >
            <li><a>Plan</a></li>
            <li><a>Calendar</a></li>
            <li><a>Expense</a></li>
            <li><a>Packing</a></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-xl">Wanderly</a>
        <div class="hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a>Plan</a></li>
            <li><a>Calendar</a></li>
            <li><a>Expense</a></li>
            <li><a>Packing</a></li>
          </ul>
        </div>
      </div>

      <div class="navbar-end gap-2">
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="btn btn-ghost btn-circle avatar"
          >
            <div class="w-10 rounded-full">
              <img
                alt="Tailwind CSS Navbar component"
                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
              />
            </div>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box text-base-content z-1 mt-3 w-52 p-2 shadow"
          >
            <li>
              <a> Profile </a>
            </li>
            <li><a>Settings</a></li>
            <li><a>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- navbar end -->
    <section class="flex flex-col items-center px-4 py-8">
      <div class="w-full max-w-[560px]">
        <h1 class="text-2xl font-light mb-6">Profile</h1>

        <div class="card bg-base-100 shadow-sm border border-base-200">
          <div class="card-body gap-3">
            <div class="flex items-center gap-4">
              <div class="avatar">
                <div class="w-20 rounded-full">
                  <img
                    id="account-avatar-preview"
                    alt="Profile photo"
                    src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
                  />
                </div>
              </div>
              <div class="flex flex-col gap-1">
                <button
                  id="changePhoto"
                  type="button"
                  class="btn btn-sm btn-outline"
                >
                  Change photo
                </button>
                <input
                  id="account-avatar-input"
                  type="file"
                  accept="image/*"
                  class="hidden"
                />
              </div>
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Name</label>
              <input
                id="account-name"
                type="text"
                placeholder="your name"
                class="input w-full"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-sm text-base-content/60">Email</label>
              <input
                id="account-email"
                type="email"
                placeholder="your email"
                class="input w-full"
              />
            </div>

            <p id="accountError" class="text-sm text-red-500 hidden"></p>
            <p id="accountSuccess" class="text-sm text-green-600 hidden"></p>

            <div class="flex justify-end mt-2">
              <button
                id="saveAccount"
                class="btn"
                style="background-color: #534ab7; color: white"
              >
                Save
              </button>
            </div>
          </div>
        </div>

        <!-- destructive, account-wide action - kept apart from the normal save flow -->
        <div class="flex flex-col items-end mt-3">
          <button id="deleteAccount" class="btn btn-sm btn-outline btn-error">
            Delete account
          </button>
          <p id="deleteAccountError" class="text-sm text-red-500 mt-2 hidden"></p>
        </div>
      </div>
    </section>

    <!-- confirmation modal for the destructive account deletion -->
    <dialog id="deleteAccountConfirmModal" class="modal">
      <div class="modal-box flex flex-col gap-4">
        <h3 class="text-lg font-semibold text-error">Delete Account?</h3>
        <p class="text-sm text-base-content/70">
          This will permanently delete your account and remove you from every
          trip you're part of. This cannot be undone.
        </p>
        <div class="flex justify-end gap-2">
          <form method="dialog">
            <button class="btn btn-ghost">Cancel</button>
          </form>
          <button id="confirmDeleteAccount" class="btn btn-error">
            Delete Account
          </button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>
  </body>
</html>
