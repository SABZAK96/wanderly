<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanderly</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.21/index.global.min.js"></script>
    <style>
      /* mobile nav dropdown items */
      .nav-dropdown li > a {
        border-radius: 0.75rem;
        font-weight: 500;
        /* daisyUI's default menu padding is too tight for a touch dropdown */
        padding: 0.6rem 0.75rem;
      }
      .nav-dropdown li > a:hover {
        background: #eeedfe;
        color: #534ab7;
      }
      :root {
       --fc-button-bg-color: #532ab7
      }

      /* move the outer border to the div wrapper so border-radius + overflow:hidden work */
      .fc-view-harness {
        border: 1px solid #534ab7;
        border-radius: 1rem;
        overflow: hidden;
      }
      .fc-daygrid-day-frame{
        border: 0.5px solid #eeedfe;
      }
   .fc .fc-button {
    border-radius: 10px;
   }
   .fc-event-title-container{
    display: flex;
    flex-direction: row;
   flex-grow: 1;
  }
   .fc-event-title {
    font-size: small;
   }

   @media (max-width: 640px) {
     .fc-daygrid-event {
       min-height: 1.5rem;
       padding: 2px 4px;
     }
     .fc-event-main {
       padding: 2px 0;
     }
     .fc-event-title {
       font-size: 0.7rem;
       white-space: normal;
       overflow: visible;
     }
   }
    </style>
  </head>
  <body class="bg-base-200 min-h-screen flex flex-col">
    <!-- navbar -->
    <div
      class="navbar bg-base-100 shadow-sm sticky top-0 z-20 px-4 lg:px-8"
      style="background-color: #534ab7; color: white"
    >
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content nav-dropdown bg-base-100 text-base-content rounded-2xl z-1 mt-3 w-52 p-2 gap-0.5 shadow-lg border border-base-200"
          >
            <li><a>Plan</a></li>
            <li><a>Calendar</a></li>
            <li><a>Expense</a></li>
            <li><a>Packing</a></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-xl">Wanderly</a>
        <div class="hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a>Plan</a></li>
            <li><a>Calendar</a></li>
            <li><a>Expense</a></li>
            <li><a>Packing</a></li>
          </ul>
        </div>
      </div>

      <div class="navbar-end gap-2">
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="btn btn-ghost btn-circle avatar"
          >
            <div class="w-10 rounded-full">
              <img
                alt="Tailwind CSS Navbar component"
                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
              />
            </div>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box text-base-content z-1 mt-3 w-52 p-2 shadow"
          >
            <li>
              <a id="navProfile"> Profile </a>
            </li>
            <li><a id="navSettings">Settings</a></li>
            <li><a id="navLogout">Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- navbar end -->

    <!-- drawer wraps the page content so the sidebar can push/overlay it -->
    <div
      class="drawer drawer-end lg:drawer-open min-h-screen"
      style="background: #eeedfe"
    >
      <input id="my-drawer-3" type="checkbox" class="drawer-toggle" />

      <!-- drawer-content = main panel -->
      <div class="drawer-content flex flex-col flex-1">
        <!-- toggle button visible only on small screens -->
        <label
          for="my-drawer-3"
          class="btn drawer-button rounded-full self-start mb-4 mx-4 mt-4 lg:hidden"
        >
          Your Trips
        </label>

        <!-- main content -->
        <section class="flex justify-center px-4 py-8">
          <div class="w-full max-w-6xl">
            <div class="font-light text-3xl">Weather</div>
            <!-- calendar -->
            <div id="calendar" class="font-light text-4xl"></div>
          </div>
        </section>
      </div>
      <!-- drawer-content end -->

      <!-- sidebar -->
      <div
        class="drawer-side lg:pt-0 pt-20 flex flex-col items-center justify-center"
        style="background-color: #534ab7"
      >
        <!-- invisible backdrop — clicking outside the sidebar closes it -->
        <label
          for="my-drawer-3"
          aria-label="close sidebar"
          class="drawer-overlay"
        ></label>
        <div class="min-h-full w-80 p-4">
          <!-- close button inside sidebar, only on mobile -->
          <label
            for="my-drawer-3"
            class="btn btn-circle btn-sm btn-ghost lg:hidden mb-4"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </label>
          <!-- container of all the trips -->
          <div class="flex flex-col gap-1 mb-5">
            <!-- one trip with name -->
            <h2
              class="text-xs uppercase tracking-wide text-white/60 px-2 mb-1"
            >
              Your Trips
            </h2>
            <div id="yourTrips"></div>
            <button
              id="addTrip"
              class="btn btn-sm btn-ghost text-white justify-start gap-1.5 mt-1 px-2.5"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              Add a New Trip
            </button>
          </div>

          <div id="singleTripInfo">
            <!-- container of the name of the trip -->
            <div id="tripHeader" class="flex flex-col gap-2"></div>

            <div id="daysInfo" class="mt-2 flex flex-col gap-1">
              <!-- summary of the activities added -->
              <div class="flex flex-col gap-2">
                <h2
                  class="flex flex-row items-baseline justify-between gap-2 text-base font-semibold text-white"
                >
                  <span>Day 1</span
                  ><span class="text-sm font-normal text-white">Jul 12</span>
                </h2>
                <div class="card flex-1 bg-base-100 card-xs shadow-sm">
                  <div class="card-body">
                    <div
                      class="flex flex-row items-center justify-between gap-2"
                    >
                      <h2 class="card-title">Universal Studios</h2>
                      <div class="flex items-center gap-2 shrink-0">
                        <p class="text-sm text-base-content/60">full-day</p>
                        <button>
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M6 18L18 6M6 6l12 12"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- drawer-side end -->
    </div>
    <!-- drawer end -->

    <!-- modal for inserting trip -->
    <dialog id="my_modal_trip" class="modal">
      <div class="modal-box flex flex-col gap-4">
        <!-- close button in its own form so it doesn't submit -->
        <form method="dialog">
          <button
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
          >
            ✕
          </button>
        </form>

        <h3 id="tripTitle" class="text-lg font-semibold">Add a New Trip</h3>

        <div class="flex flex-col gap-1">
          <label class="text-sm text-base-content/60">Destination</label>
          <input
            id="dest-title"
            type="text"
            placeholder="e.g. Tokyo, Japan"
            class="input w-full"
          />
        </div>

        <div class="flex gap-3">
          <div class="flex flex-col gap-1 flex-1">
            <label for="" class="text-sm text-base-content/60"
              >Start Date</label
            >
            <input id="startDate" type="date" class="input w-full" />
          </div>
          <div class="flex flex-col gap-1 flex-1">
            <label for="" class="text-sm text-base-content/60">End Date</label>
            <input id="endDate" type="date" class="input w-full" />
          </div>
        </div>
        <p id="tripError" class="text-sm text-red-500 mt-1 hidden"></p>

        <div class="modal-action mt-0">
          <form method="dialog">
            <button class="btn btn-ghost">Cancel</button>
          </form>
          <button
            id="createTrip"
            class="btn"
            style="background-color: #534ab7; color: white"
          >
            Create Trip
          </button>
        </div>
      </div>

      <!-- click outside to close -->
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script src="scripts/navbar.js"></script>
    <script src="scripts/dates.js"></script>
    <script src="scripts/sidebar.js"></script>
    <script src="scripts/calendar.js"></script>
  </body>
</html>
